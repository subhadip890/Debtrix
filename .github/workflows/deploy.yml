name: Build & Deploy Smart Contract

on:
  push:
    branches:
      - '*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Rust + WASM target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source $HOME/.cargo/env
          rustup target add wasm32-unknown-unknown

      - name: Build Smart Contract
        run: |
          source $HOME/.cargo/env
          cd contracts/expense_splitter
          cargo build --target wasm32-unknown-unknown --release

      - name: Install System Dependencies
        run: sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libusb-1.0-0-dev

      - name: Install Stellar CLI
        run: |
          source $HOME/.cargo/env
          cargo install stellar-cli --locked
          stellar --version

      - name: Deploy Contract to Testnet
        run: |
          cd contracts/expense_splitter
          stellar keys generate alice --network testnet
          ALICE_ADDRESS=$(stellar keys address alice)
          echo "Funding alice account: $ALICE_ADDRESS"
          curl -s "https://friendbot.stellar.org?addr=$ALICE_ADDRESS" > /dev/null
          echo "Account funded!"
          echo "================================================="
          echo "CONTRACT ID:"
          echo "================================================="
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/debtrix_contract.wasm \
            --source alice \
            --network testnet
