name: Deploy Smart Contract

on:
  push:
    branches:
      - '*' # Runs on any branch push

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy Contract via Official Stellar Docker
        run: |
          cd contracts/expense_splitter
          
          echo "Pulling official Stellar CLI environment... (10 seconds)"
          
          # We use the official Docker image to bypass all installations and ensure it always works instantly.
          # Everything is run inside a single container session so the generated keys persist.
          docker run --rm -v $PWD:/workspace -w /workspace stellar/stellar-cli:latest bash -c "\
            stellar keys generate --global alice --network testnet && \
            echo '=================================================' && \
            echo 'SUCCESSFULLY DEPLOYED! HERE IS YOUR CONTRACT ID:' && \
            echo '=================================================' && \
            stellar contract deploy --wasm target/wasm32-unknown-unknown/release/debtrix_contract.wasm --source alice --network testnet"
